# Local development only — do NOT use in production
version: '3.9'

services:
  # ── PostgreSQL ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cinevault_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: movies
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  # ── NestJS App ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder        # use builder stage for dev (has devDeps)
    container_name: cinevault_app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/movies?schema=public
      JWT_SECRET: local_dev_secret_replace_in_prod
      JWT_ACCESS_TOKEN_TTL: 3h
      JWT_REFRESH_TOKEN_TTL: 1d
      COOKIE_DOMAIN: localhost
      NODE_ENV: development
      FRONTEND_URL: http://localhost:3001
      # Optional: set these to test Cloudinary locally
      # CLOUDINARY_CLOUD_NAME: your_cloud_name
      # CLOUDINARY_API_KEY: your_api_key
      # CLOUDINARY_API_SECRET: your_api_secret
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy --config prisma.config.ts && npm run start:dev"
    volumes:
      - ./src:/app/src           # hot reload
      - ./prisma:/app/prisma

volumes:
  postgres_data:
